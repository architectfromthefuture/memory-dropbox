<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0;
      background: #0f1419;
      color: #e8eaed;
      line-height: 1.5;
    }
    main { padding: 24px; max-width: 900px; margin: 0 auto; }
    a { color: #6ee7b7; }
    .card {
      padding: 18px;
      border: 1px solid rgba(127,127,127,.28);
      border-radius: 14px;
      background: rgba(127,127,127,.06);
    }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    pre { white-space: pre-wrap; word-break: break-word; margin-top: 12px; opacity: .95; }
    .muted { opacity: .75; font-size: .9rem; }
  </style>
</head>
<body>
  <main>
    <p><a href="/">← Explorer</a></p>
    <section class="card">
      <h2>{{ item.title }}</h2>
      <p class="muted">Kind: {{ item.kind }} · Created: {{ item.created_at }}</p>
      {% if item.tags %}
      <p>Tags:
        {% for tag in item.tags %}
        <code>{{ tag.name }}</code>
        {% endfor %}
      </p>
      {% endif %}
      <pre>{{ item.body }}</pre>
    </section>
  </main>
</body>
</html>
